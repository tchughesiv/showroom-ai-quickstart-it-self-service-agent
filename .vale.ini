# Run `vale sync` after editing Packages (make install / make vale-sync). write-good is fetched, not committed.
# Custom vocab: .vale/styles/config/vocabularies/Workshop/ (Vale 3+).
# See https://vale.sh/docs/topics/config/
StylesPath = .vale/styles

MinAlertLevel = error

Packages = write-good

Vocab = Workshop

[formats]
AsciiDoc = .adoc

[*.{adoc}]
BasedOnStyles = write-good
