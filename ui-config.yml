---
type: showroom

# Set the left column width to 30%
default_width: 30
# Persist the URL state so browser refresh doesn't reset the UI
persist_url_state: true

view_switcher:
  enabled: true
  default_mode: split

tabs:
  # OCP Console (${DOMAIN} from RHDP deployment; omit if not using Showroom on RHDP)
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'

  # Quickstart repository and reference docs
  - name: Quickstart Repo
    url: 'https://github.com/rh-ai-quickstart/it-self-service-agent'
  - name: Llama Stack Docs
    url: 'https://llama-stack.readthedocs.io/en/latest/'
